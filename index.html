<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eagle Tavern Radio</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #fff;
    }

    .scene {
      position: relative;
      display: inline-block;
      width: min(1000px, 90vw);
    }

    .tavern {
      display: block;
      width: 100%;
      border: 8px solid #000;
      box-sizing: border-box;
    }

    .transmitter {
      position: absolute;
      width: 25%;
      top: -14%;
      left: 10%;
      transform: rotate(-20deg);
    }
  </style>
</head>
<body>
  <div class="scene">
    <img src="eagle-tavern.jpg" alt="Eagle Tavern" class="tavern">
    <img src="transmitter.png" alt="Transmitter" class="transmitter">
  </div>
</body>
</html>
